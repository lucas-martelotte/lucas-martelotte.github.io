<!DOCTYPE html>
<html>

<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    <title>Lucas Rufino 118046647</title>

    <style type="text/css">
        body {
            background-image: linear-gradient(white, aquamarine);
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            display: flex;

        }

        .container {
            height: 1000px;
            width: 100%;
            overflow: hidden;
        }

        .desenho-container {
            background-color: white;
            border: 2px black solid;
            width: 600px;
            height: 600px;
        }


        .list_element {
            margin-top: 5px;
            margin-bottom: 5px;
            width: 200px;
            height: 100%;
        }

        .list {
            display: flex;
            flex-direction: column;
            width: 200px;
            height: 50px;
        }
    </style>
</head>

<body>
    <div class="list">
        <div class="list_element">
            <div id="ratioValue"></div>
            <input id="ratio_input" type="range" min="0" value="0.5" max="1" step="0.01"
                oninput="change_ratio_input(this.value)" />
        </div>

        <div class="list_element">
            <div id="NValue"></div>
            <input id="n_input" type="range" min="0" value="2" max="30" step="1" oninput="change_n_input(this.value)" />
        </div>

        <div class="list_element">
            <div id="variationValue"></div>
            <input type="radio" id="variation_0" name="variation" checked="true" value="0">
            <input type="radio" id="variation_1" name="variation" value="1">
            <input type="radio" id="variation_2" name="variation" value="2">
            <input type="radio" id="variation_3" name="variation" value="3">
        </div>
    </div>

    <div id="viewPort" class="container">
        <div class="desenho-container">
            <svg id="desenho" width=600 height=600 style="border:1px solid gray"></svg>
        </div>
    </div>

</body>

<script type="text/javascript">

    function change_ratio_input(value) {
        ratioValue.innerHTML = "Razão " + value
        ratio = value
        localstorage.setItem("ratio", value)
        desenhar()
    }

    function change_n_input(value) {
        NValue.innerHTML = "N. de Quadrados " + value
        N = value
        localstorage.setItem("N. de Quadrados", value)
        desenhar()
    }

    let localstorage = window.localStorage;

    let ratio = localstorage.getItem("ratio") ? localstorage.getItem("ratio") : 0.5
    let ratioValue = document.getElementById("ratioValue")
    ratioValue.innerHTML = "Razão " + ratio

    let N = localstorage.getItem("N. de Quadrados") ? localstorage.getItem("N. de Quadrados") : 2
    let NValue = document.getElementById("NValue")
    NValue.innerHTML = "N. de Quadrados " + N

    let variation = localstorage.getItem("variation") ? Number(localstorage.getItem("variation")) : 0;
    $('#variationValue').html("Variação " + variation)
    $('input:radio[name=variation]').change(() => {
        variation = $('input:radio[name=variation]:checked').val();
        $('#variationValue').html("Variação " + variation)
        localstorage.setItem("variation", variation)
        desenhar()
    })

    desenho = document.getElementById("desenho")

    $("#viewPort .desenho-container").draggable({
        containment: "#viewPort",
    });

    function desenhar() {
        const [width, height] = [600, 600];
        desenho.innerHTML = "";
        const cores = ["red", "yellow", "blue", "green"];

        function get_init_state() {
            return width / 10
        }

        function get_multiplicative_factor(ratio) {
            return 4 * (1 - Math.sqrt(2)) * (Math.pow(ratio, 2) - ratio) + 1
        }

        function get_sqr_svg(point_1, point_2, color, counterClockWise) {
            let diff_vec = [point_2[0] - point_1[0], point_2[1] - point_1[1]]
            let perp_diff_vec = [-diff_vec[1], diff_vec[0]]
            if (counterClockWise) {
                perp_diff_vec = [-perp_diff_vec[0], -perp_diff_vec[1]]
            }

            let point_3 = [point_2[0] + perp_diff_vec[0], point_2[1] + perp_diff_vec[1]]
            let point_4 = [point_1[0] + perp_diff_vec[0], point_1[1] + perp_diff_vec[1]]

            let sq = document.createElement("polygon")
            sq.setAttribute("fill", `${color}`)
            sq.setAttribute("points", `${point_1[0]},${point_1[1]} ${point_2[0]},${point_2[1]} ${point_3[0]},${point_3[1]} ${point_4[0]},${point_4[1]}`)
            sq.setAttribute("opacity", "0.7")
            return sq
        }

        function refl_sqr_axis(point_1, point_2, axis) {
            let diff_vec = [point_2[0] - point_1[0], point_2[1] - point_1[1]]

            let norm_axis = Math.sqrt(Math.pow(axis[0], 2) + Math.pow(axis[1], 2))
            let normalized_axis = [axis[0] / norm_axis, axis[1] / norm_axis]

            let projected_norm = normalized_axis[0] * diff_vec[0] + normalized_axis[1] * diff_vec[1]
            let projected_vec = [normalized_axis[0] * projected_norm, normalized_axis[1] * projected_norm]
            let perp_translation = [diff_vec[0] - projected_vec[0], diff_vec[1] - projected_vec[1]]
            let reflected_diff_vec = [diff_vec[0] - 2 * perp_translation[0], diff_vec[1] - 2 * perp_translation[1]]

            return [point_1, [point_1[0] + reflected_diff_vec[0], point_1[1] + reflected_diff_vec[1]]]
        }

        function refl_sqr_mid(point_1, point_2) {
            let dist_mid_1 = width / 2 - point_1[0]
            let dist_mid_2 = width / 2 - point_2[0]

            return [[point_1[0] + dist_mid_1 * 2, point_1[1]], [point_2[0] + dist_mid_2 * 2, point_2[1]]]
        }

        function iterate(curr_p1, curr_p2, ratio, variation) {
            let curr_diff_vec = [curr_p2[0] - curr_p1[0], curr_p2[1] - curr_p1[1]]
            let curr_perp_diff_vec = [-curr_diff_vec[1], curr_diff_vec[0]]
            let curr_size = Math.sqrt(Math.pow(curr_diff_vec[0], 2) + Math.pow(curr_diff_vec[1], 2))

            let translation_vec = [0, 0]

            if (variation == 3 || variation == 2) {
                translation_vec = [translation_vec[0] + curr_perp_diff_vec[0], translation_vec[1] + curr_perp_diff_vec[1]]
            }

            let new_p1 = [curr_p1[0] + translation_vec[0], curr_p1[1] + translation_vec[1]]
            let new_p2 = [curr_p2[0] + translation_vec[0], curr_p2[1] + translation_vec[1]]
            let newSize = curr_size * get_multiplicative_factor(ratio)

            let tilt = Math.sqrt(Math.pow(newSize, 2) - Math.pow(curr_size, 2))

            if (ratio == 0.5) {
                new_p1 = new_p1
                new_p2 = [new_p2[0] + curr_perp_diff_vec[0], new_p2[1] + curr_perp_diff_vec[1]]
            } else if (ratio < 0.5) {
                let tilt_vec = [tilt * curr_perp_diff_vec[0] / curr_size, tilt * curr_perp_diff_vec[1] / curr_size]
                new_p1 = new_p1
                new_p2 = [new_p2[0] + tilt_vec[0], new_p2[1] + tilt_vec[1]]
            } else if (ratio > 0.5) {
                let tilt_vec = [tilt * curr_diff_vec[0] / curr_size, tilt * curr_diff_vec[1] / curr_size]
                new_p1 = new_p1
                new_p2 = [new_p1[0] + curr_perp_diff_vec[0] + tilt_vec[0], new_p1[1] + curr_perp_diff_vec[1] + tilt_vec[1]]
            }

            if ((variation == 1 || variation == 2) && false) {
                return
                new_p1 = [new_p1[0] + curr_diff_vec[0], new_p1[1] + curr_diff_vec[1]]
                new_p2 = [new_p2[0] + curr_diff_vec[0], new_p2[1] + curr_diff_vec[1]]

                let reflected_points = refl_sqr_axis(new_p1, new_p2, curr_perp_diff_vec)
                new_p1 = reflected_points[0]
                new_p2 = reflected_points[1]
            }

            return [new_p1, new_p2]
        }

        let size = get_init_state()
        let point_1 = [width / 2 - size / 2, height / 2 - size / 2]
        let point_2 = [width / 2 + size / 2, height / 2 - size / 2]
        let color = cores[cores.length - 1]
        let corrected_ratio = ratio

        if (variation == 1 || variation == 2) {
            corrected_ratio = 1 - ratio
        }

        desenho.appendChild(get_sqr_svg(point_1, point_2, color, false))

        for (let i = 0; i < N - 1; i++) {
            let color = cores[i % cores.length];
            let points = iterate(point_1, point_2, corrected_ratio, variation)
            point_1 = points[0]
            point_2 = points[1]

            let refl_p1 = point_1
            let refl_p2 = point_2
            let reflection = false
            if (variation == 1 || variation == 2) {
                reflection = true
                points = refl_sqr_mid(point_1, point_2)
                refl_p1 = points[0]
                refl_p2 = points[1]
            }

            desenho.appendChild(get_sqr_svg(refl_p1, refl_p2, color, reflection));
        }
        document.getElementById("desenho").innerHTML += "";
    }
    desenhar()
</script>

</html>
